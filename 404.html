<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Fumble! | The Snack Shack</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #002244; --action-green: #69BE28; --wolf-grey: #A5ACAF; }
        body { font-family: 'Roboto', sans-serif; background: var(--navy); color: white; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .error-container { padding: 2rem; border: 4px solid var(--action-green); border-radius: 15px; background: rgba(255,255,255,0.05); max-width: 500px; }
        h1 { font-family: 'Oswald', sans-serif; font-size: 5rem; color: var(--action-green); margin: 0; }
        p { font-size: 1.2rem; margin-bottom: 2rem; }
        .btn { background: var(--action-green); color: var(--navy); padding: 1rem 2rem; text-decoration: none; border-radius: 5px; font-weight: bold; text-transform: uppercase; }
        .btn:hover { background: white; }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>404</h1>
        <h2>Fumble on the Play!</h2>
        <p>Looks like that page went out of bounds. Don't worry, the Shack is still open for business.</p>
        <a href="/" class="btn">Back to the Home Field</a>
    </div>
</body>
</html>
